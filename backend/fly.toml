app = 'mvp-backend-little-woodland-6494'
primary_region = 'gru'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
